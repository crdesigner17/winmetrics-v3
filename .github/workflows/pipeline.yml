name: WinMetrics V3 — Pipeline

on:
  schedule:
    - cron: '55 3  * * *'   # 00:55 BRT
    - cron: '55 9  * * *'   # 06:55 BRT
    - cron: '55 15 * * *'   # 12:55 BRT
    - cron: '55 21 * * *'   # 18:55 BRT

  push:
    branches: [main]
    paths:
      - 'frontend/jobs/pipeline_v1.js'
      - 'frontend/jobs/generate_predictions.js'
      - 'frontend/lib/prediction_engine_v1.js'
      - 'frontend/previsoes.html'
      - 'scripts/backfill.js'
      - '.github/workflows/pipeline.yml'

concurrency:
  group: pipeline-v3
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: npm install

      - name: Backfill automático
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          API_FOOTBALL_KEY:     ${{ secrets.API_FOOTBALL_KEY }}
          ODDS_API_KEY:         ${{ secrets.ODDS_API_KEY }}
        run: |
          FROM=$(TZ="America/Sao_Paulo" date -d "-2 days" +%Y-%m-%d)
          echo "▶ Backfill automático: $FROM → hoje + 7 dias"
          node scripts/backfill.js --from="$FROM" --future="5" --delay=2000
          EXIT=$?
          [ $EXIT -eq 2 ] && echo "⛔ Quota esgotada." && exit 0
          exit $EXIT
